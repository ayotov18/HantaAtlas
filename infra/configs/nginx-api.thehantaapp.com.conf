# /etc/nginx/sites-available/api.thehantaapp.com
# HantaAtlas iOS backend reverse proxy. Strong defaults: TLS 1.2/1.3 only,
# HSTS, secure headers, modest rate-limits, request-size cap, gzip off for
# JSON (already small), no exposure of internal app port.

# ── Rate limit: 30 req/s burst 60 per IP, applied to /v1/* below. ──
limit_req_zone $binary_remote_addr zone=ioszone:10m rate=30r/s;
limit_conn_zone $binary_remote_addr zone=iosconn:10m;

# ── Map: only allow methods we serve. ──
map $request_method $allowed_method {
    default                 0;
    GET                     1;
    HEAD                    1;
    OPTIONS                 1;
}

# ── HTTP → HTTPS redirect, plus ACME challenge passthrough. ──
server {
    listen 80;
    listen [::]:80;
    server_name api.thehantaapp.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS production listener ──
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.thehantaapp.com;

    # ── TLS ──
    ssl_certificate     /etc/letsencrypt/live/api.thehantaapp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.thehantaapp.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/api.thehantaapp.com/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1h;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 9.9.9.9 valid=300s;
    resolver_timeout 5s;

    # ── Security headers ──
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;

    # ── Limits ──
    client_max_body_size 1m;
    client_body_buffer_size 32k;
    client_header_timeout 10s;
    client_body_timeout 10s;
    send_timeout 10s;
    keepalive_timeout 30s;
    server_tokens off;

    # ── Connection cap per IP ──
    limit_conn iosconn 20;

    # ── Block disallowed methods globally ──
    if ($allowed_method = 0) {
        return 405;
    }

    # ── Health endpoint (no rate-limit) ──
    location = /health {
        access_log off;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:3000;
    }

    # ── API ──
    location /v1/ {
        limit_req zone=ioszone burst=60 nodelay;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Connection        "";

        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        proxy_pass http://127.0.0.1:3000;
    }

    # OpenAPI JSON only (Swagger UI is intentionally NOT exposed publicly).
    location = /openapi.json {
        proxy_pass http://127.0.0.1:3000;
    }

    # Block everything else with a hard 404 — no admin panels, no docs UI,
    # no metrics, no internal routes leak through.
    location / {
        return 404;
    }
}
