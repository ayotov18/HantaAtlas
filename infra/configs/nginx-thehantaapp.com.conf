# /etc/nginx/sites-available/thehantaapp.com
# Marketing site (Next.js static export) for thehantaapp.com + www.thehantaapp.com.
# Sibling to the API nginx config which serves api.thehantaapp.com on the same VPS.
# Cloudflare-proxied; inherits /etc/nginx/conf.d/00-cloudflare-realip.conf globally.

server {
    listen 80;
    listen [::]:80;
    server_name thehantaapp.com www.thehantaapp.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://thehantaapp.com$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.thehantaapp.com;

    ssl_certificate     /etc/letsencrypt/live/thehantaapp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thehantaapp.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/thehantaapp.com/chain.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Authenticated Origin Pulls — only Cloudflare-issued client certs accepted.
    ssl_client_certificate /etc/cloudflare/origin-pull-ca.pem;
    ssl_verify_client on;

    return 301 https://thehantaapp.com$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name thehantaapp.com;

    ssl_certificate     /etc/letsencrypt/live/thehantaapp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thehantaapp.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/thehantaapp.com/chain.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Authenticated Origin Pulls — only Cloudflare-issued client certs accepted.
    ssl_client_certificate /etc/cloudflare/origin-pull-ca.pem;
    ssl_verify_client on;

    root /var/www/thehantaapp.com;
    index index.html;

    server_tokens off;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml;
    gzip_min_length 256;
    gzip_vary on;

    # Far-future cache for Next's hashed assets.
    location /_next/static/ {
        access_log off;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Static media + screenshots can be cached aggressively.
    location ~* ^/(assets|screenshots|media)/.*\.(png|jpe?g|webp|avif|svg|mp4|webm|woff2?)$ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    # HTML must not be cached aggressively — content updates often.
    location / {
        add_header Cache-Control "public, max-age=0, must-revalidate" always;
        try_files $uri $uri/ $uri.html /index.html;
    }
}
